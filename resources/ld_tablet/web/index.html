<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LD Tablet</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="tablet" class="hidden">
        <div id="frame">
            <div id="screen">
                <div class="statusbar">
                    <span id="time">09:42</span>
                    <span id="os-title">TaxiOS</span>
                    <span>100%</span>
                </div>

                <div id="topbar" class="hidden">
                    <button id="back" type="button">‹</button>
                    <strong id="page-title">Home</strong>
                    <button id="home" type="button">⌂</button>
                </div>

                <main id="view"></main>

                <button id="close" type="button">×</button>
                <div id="toast-box"></div>
                <div id="modal" class="hidden"></div>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
    <script src="./driver-status.js"></script>
</body>
</html>
