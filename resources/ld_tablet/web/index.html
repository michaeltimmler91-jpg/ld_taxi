<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LD Tablet</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        *{box-sizing:border-box;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent!important;font-family:Arial,Helvetica,sans-serif}.hidden{display:none!important}#tablet{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:auto}#frame{width:860px;height:560px;padding:24px;border-radius:42px;background:linear-gradient(145deg,#050505,#171717);box-shadow:0 25px 90px rgba(0,0,0,.85)}#screen{width:100%;height:100%;border-radius:28px;overflow:hidden;position:relative;background:rgba(16,18,20,.94);color:#fff}.statusbar{height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(0,0,0,.35);color:#f8c93a;font-weight:700}main{padding:28px}h1{text-align:center;color:#f8c93a;margin:18px 0 32px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}.grid button{height:105px;border:0;border-radius:24px;background:rgba(255,255,255,.08);color:#fff;font-weight:700;cursor:pointer}.grid button:hover{background:rgba(248,201,58,.2)}#close{position:absolute;top:52px;right:18px;width:34px;height:34px;border:0;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:24px;cursor:pointer}#close:hover{background:rgba(255,80,80,.35)}
    </style>
</head>
<body>
    <div id="tablet" class="hidden">
        <div id="frame">
            <div id="screen">
                <div class="statusbar">
                    <span id="time">09:42</span>
                    <span>TaxiOS</span>
                    <span>100%</span>
                </div>

                <main>
                    <h1>Los Santos Taxi</h1>
                    <div class="grid">
                        <button>Dashboard</button>
                        <button>Aufträge</button>
                        <button>Fahrer</button>
                        <button>Leitstelle</button>
                        <button>Bewertungen</button>
                        <button>Schwarzes Brett</button>
                        <button>Profil</button>
                        <button>Einstellungen</button>
                    </div>
                </main>

                <button id="close" type="button">×</button>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
