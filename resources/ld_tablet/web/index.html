<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LD Tablet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tablet" class="hidden">
        <div id="frame">
            <div id="screen">
                <div class="statusbar">
                    <span id="time">09:42</span>
                    <span>TaxiOS</span>
                    <span>100%</span>
                </div>

                <main>
                    <h1>Los Santos Taxi</h1>
                    <div class="grid">
                        <button>Dashboard</button>
                        <button>Aufträge</button>
                        <button>Fahrer</button>
                        <button>Leitstelle</button>
                        <button>Bewertungen</button>
                        <button>Schwarzes Brett</button>
                        <button>Profil</button>
                        <button>Einstellungen</button>
                    </div>
                </main>

                <button id="close">×</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
